<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartAgent Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #00d4ff;
    }
    p {
      font-size: 1rem;
      opacity: 0.7;
    }
    .status {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SmartAgent Desktop</h1>
    <p>桌面应用启动成功 🎉</p>
    <div class="status" id="status">加载中...</div>
  </div>
  <script>
    // 显示预加载脚本注入的 app 信息
    if (window.app) {
      document.getElementById('status').textContent =
        '平台: ' + window.app.platform + ' | ' + window.app.name;
    }
  </script>
</body>
</html>
