<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartAgent Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部标题栏 ── */
    .header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #161822;
      border-bottom: 1px solid #2a2d3a;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #a0a4b8;
      letter-spacing: 0.5px;
    }
    .header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 10px;
      flex-shrink: 0;
    }

    /* ── 聊天区域 ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1e2030;
      color: #d0d4e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2d3a;
    }
    .msg.error {
      align-self: flex-start;
      background: #3b1015;
      color: #fca5a5;
      border: 1px solid #5c1a1a;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }

    /* 打字光标 */
    .streaming::after {
      content: ' ▌';
      animation: blink 0.8s infinite;
      color: #4ade80;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── 底部输入栏 ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #161822;
      border-top: 1px solid #2a2d3a;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .input-bar input:focus { border-color: #3b82f6; }
    .input-bar input:disabled { opacity: 0.4; }

    .input-bar button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-send {
      background: #2563eb;
      color: #fff;
    }
    .btn-send:hover:not(:disabled) { background: #1d4ed8; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop {
      background: #dc2626;
      color: #fff;
    }
    .btn-stop:hover { background: #b91c1c; }

    /* ── 空状态占位 ── */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4a4d5e;
      gap: 8px;
    }
    .placeholder .icon { font-size: 48px; opacity: 0.3; }
    .placeholder p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="dot"></span>
    <h1 id="header-title">SmartAgent Desktop</h1>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-bar">
    <input
      id="input"
      type="text"
      placeholder="输入问题，按 Enter 发送..."
      autofocus
    />
    <button id="btn-send" class="btn-send" disabled>发送</button>
  </div>

  <script>
    // ── DOM 引用 ──
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const btnSend = document.getElementById('btn-send');
    const headerTitle = document.getElementById('header-title');

    // 显示平台信息
    if (window.agent && window.agent.platform) {
      headerTitle.textContent = window.agent.name + ' · ' + window.agent.platform;
    }

    // ── 状态 ──
    let isStreaming = false;
    let currentBotMsg = null;

    // 启用/禁用输入
    inputEl.addEventListener('input', () => {
      btnSend.disabled = isStreaming || !inputEl.value.trim();
    });

    // ── 工具函数 ──
    function scrollBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = (role === 'user' ? '' : '') + text;
      chatEl.appendChild(div);
      scrollBottom();
      return div;
    }

    function setButtonState() {
      if (isStreaming) {
        btnSend.className = 'btn-stop';
        btnSend.textContent = '停止';
        btnSend.disabled = false;
        inputEl.disabled = true;
      } else {
        btnSend.className = 'btn-send';
        btnSend.textContent = '发送';
        btnSend.disabled = !inputEl.value.trim();
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    // ── 核心：发送并接收流式回复 ──
    function sendPrompt() {
      const prompt = inputEl.value.trim();
      if (!prompt || isStreaming) return;

      inputEl.value = '';
      isStreaming = true;
      setButtonState();

      // 显示用户消息
      addMsg(prompt, 'user');

      // 创建空的机器人消息容器
      currentBotMsg = addMsg('', 'bot');
      currentBotMsg.classList.add('streaming');
      let fullText = '';

      window.agent.askStream(
        prompt,
        // onChunk — 每收到一段文字就追加
        (text) => {
          fullText += text;
          currentBotMsg.textContent = fullText;
          scrollBottom();
        },
        // onDone — 流结束
        () => {
          currentBotMsg.classList.remove('streaming');
          currentBotMsg = null;
          isStreaming = false;
          setButtonState();
        },
        // onError
        (errMsg) => {
          currentBotMsg.classList.remove('streaming');
          currentBotMsg.className = 'msg error';
          currentBotMsg.textContent = '❌ ' + errMsg;
          currentBotMsg = null;
          isStreaming = false;
          setButtonState();
        }
      );
    }

    // ── 中断 ──
    function stopStreaming() {
      if (!isStreaming) return;
      window.agent.interrupt();
      if (currentBotMsg) {
        currentBotMsg.classList.remove('streaming');
        currentBotMsg.textContent += '\n[已中断]';
        currentBotMsg = null;
      }
      isStreaming = false;
      setButtonState();
    }

    // ── 事件绑定 ──
    btnSend.addEventListener('click', () => {
      if (isStreaming) {
        stopStreaming();
      } else {
        sendPrompt();
      }
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (isStreaming) {
          stopStreaming();
        } else if (inputEl.value.trim()) {
          sendPrompt();
        }
      }
    });
  </script>
</body>
</html>
